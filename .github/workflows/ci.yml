name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  pipeline:
    uses: Mooroon5-CNP/ci-templates/.github/workflows/pipeline.yml@main
    with:
      app_name: "mooron5"
      app_port: "8080"
      config_repo_url: "https://github.com/Mooroon5-CNP/config-repo"
      target_cloud: "gcp"
    secrets:
      CONFIG_REPO_TOKEN: ${{ secrets.CONFIG_REPO_TOKEN }}

  update-cloudrun-claim:
    needs: pipeline
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: Mooroon5-CNP/config-repo
          token: ${{ secrets.CONFIG_REPO_TOKEN }}
      - name: Update Cloud Run image tag
        run: |
          sed -i "s|image: europe-west9-docker.pkg.dev/cnp-terraform-500015/cnp-registry/mooron5:.*|image: europe-west9-docker.pkg.dev/cnp-terraform-500015/cnp-registry/mooron5:${{ github.sha }}|" \
            apps/mooron5/crossplane/cloudrun-claim.yaml
          git config user.email "ci-bot@cnp"
          git config user.name "CI Bot"
          git add apps/mooron5/crossplane/cloudrun-claim.yaml
          git diff --staged --quiet && exit 0
          git commit -m "ci(mooron5): cloud run → ${{ github.sha }}"
          for i in 1 2 3; do
            git pull --rebase && git push && break || sleep 5
          done
